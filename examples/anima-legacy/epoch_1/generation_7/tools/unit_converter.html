<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #fafafa; --surface: #fff; --text: #1a1a1a; --muted: #666; --border: #e5e7eb; --accent: #ea580c; --accent-light: #fff7ed; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
.container { max-width: 640px; margin: 0 auto; padding: 20px; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 20px; }

.categories { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.cat-btn {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
  background: var(--surface); cursor: pointer; font-size: 0.8rem; transition: all 0.15s;
}
.cat-btn:hover { border-color: var(--accent); color: var(--accent); }
.cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.converter { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }

.input-group { margin-bottom: 16px; }
.input-row { display: flex; gap: 8px; align-items: center; }
.value-input {
  flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 1.2rem; font-family: 'SF Mono', monospace; text-align: right;
}
.value-input:focus { outline: none; border-color: var(--accent); }
.unit-select {
  min-width: 140px; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.9rem; background: var(--surface); cursor: pointer;
}
.unit-select:focus { outline: none; border-color: var(--accent); }

.swap-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; margin: 8px auto; border: 1px solid var(--border);
  border-radius: 50%; background: var(--surface); cursor: pointer; font-size: 1rem;
  transition: all 0.2s;
}
.swap-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }

.result-display {
  padding: 16px; background: var(--accent-light); border-radius: 8px;
  text-align: center; margin-top: 16px;
}
.result-value { font-size: 1.5rem; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--accent); }
.result-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

.all-conversions { margin-top: 20px; }
.all-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
.conv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
@media (max-width: 500px) { .conv-grid { grid-template-columns: 1fr; } }
.conv-item {
  display: flex; justify-content: space-between; padding: 6px 10px; border-radius: 6px;
  font-size: 0.82rem; cursor: pointer; transition: background 0.1s;
}
.conv-item:hover { background: var(--accent-light); }
.conv-unit { color: var(--muted); }
.conv-value { font-family: monospace; font-weight: 500; }

.formula { margin-top: 12px; padding: 8px 12px; background: #f3f4f6; border-radius: 6px; font-size: 0.78rem; color: var(--muted); text-align: center; font-family: monospace; }
.nav-back { display:block; font-size:0.7rem; margin-bottom:8px; } .nav-back a { color:var(--muted); text-decoration:none; } .nav-back a:hover { color:var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="nav-back"><a href="index.html">← Micro Tools</a></div>
  <h1>Unit Converter</h1>
  <p class="subtitle">Length, weight, temperature, data, time, speed, area, volume</p>

  <div class="categories" id="categories"></div>

  <div class="converter">
    <div class="input-group">
      <div class="input-row">
        <input type="number" class="value-input" id="from-value" value="1" step="any">
        <select class="unit-select" id="from-unit"></select>
      </div>
    </div>

    <button class="swap-btn" onclick="swapUnits()" title="Swap">⇅</button>

    <div class="input-group">
      <div class="input-row">
        <input type="number" class="value-input" id="to-value" readonly tabindex="-1" style="background:#f9fafb">
        <select class="unit-select" id="to-unit"></select>
      </div>
    </div>

    <div class="result-display">
      <div class="result-value" id="result-value">—</div>
      <div class="result-label" id="result-label"></div>
    </div>

    <div class="formula" id="formula"></div>

    <div class="all-conversions">
      <div class="all-title">All conversions</div>
      <div class="conv-grid" id="conv-grid"></div>
    </div>
  </div>
</div>

<script>
const UNITS = {
  length: {
    name: 'Length',
    units: {
      km: { name: 'Kilometer', factor: 1000 },
      m: { name: 'Meter', factor: 1 },
      cm: { name: 'Centimeter', factor: 0.01 },
      mm: { name: 'Millimeter', factor: 0.001 },
      μm: { name: 'Micrometer', factor: 1e-6 },
      mi: { name: 'Mile', factor: 1609.344 },
      yd: { name: 'Yard', factor: 0.9144 },
      ft: { name: 'Foot', factor: 0.3048 },
      in: { name: 'Inch', factor: 0.0254 },
      nmi: { name: 'Nautical mile', factor: 1852 },
    }
  },
  weight: {
    name: 'Weight',
    units: {
      t: { name: 'Metric ton', factor: 1000000 },
      kg: { name: 'Kilogram', factor: 1000 },
      g: { name: 'Gram', factor: 1 },
      mg: { name: 'Milligram', factor: 0.001 },
      μg: { name: 'Microgram', factor: 1e-6 },
      lb: { name: 'Pound', factor: 453.592 },
      oz: { name: 'Ounce', factor: 28.3495 },
      st: { name: 'Stone', factor: 6350.29 },
    }
  },
  temperature: {
    name: 'Temperature',
    units: {
      '°C': { name: 'Celsius' },
      '°F': { name: 'Fahrenheit' },
      'K': { name: 'Kelvin' },
    },
    custom: true
  },
  data: {
    name: 'Data',
    units: {
      TB: { name: 'Terabyte', factor: 1e12 },
      GB: { name: 'Gigabyte', factor: 1e9 },
      MB: { name: 'Megabyte', factor: 1e6 },
      KB: { name: 'Kilobyte', factor: 1e3 },
      B: { name: 'Byte', factor: 1 },
      bit: { name: 'Bit', factor: 0.125 },
      TiB: { name: 'Tebibyte', factor: 1099511627776 },
      GiB: { name: 'Gibibyte', factor: 1073741824 },
      MiB: { name: 'Mebibyte', factor: 1048576 },
      KiB: { name: 'Kibibyte', factor: 1024 },
    }
  },
  time: {
    name: 'Time',
    units: {
      yr: { name: 'Year', factor: 31557600 },
      wk: { name: 'Week', factor: 604800 },
      d: { name: 'Day', factor: 86400 },
      hr: { name: 'Hour', factor: 3600 },
      min: { name: 'Minute', factor: 60 },
      s: { name: 'Second', factor: 1 },
      ms: { name: 'Millisecond', factor: 0.001 },
      μs: { name: 'Microsecond', factor: 1e-6 },
    }
  },
  speed: {
    name: 'Speed',
    units: {
      'km/h': { name: 'km/h', factor: 1 / 3.6 },
      'm/s': { name: 'm/s', factor: 1 },
      'mph': { name: 'mph', factor: 0.44704 },
      'kn': { name: 'Knot', factor: 0.514444 },
      'ft/s': { name: 'ft/s', factor: 0.3048 },
    }
  },
  area: {
    name: 'Area',
    units: {
      'km²': { name: 'Sq kilometer', factor: 1e6 },
      'ha': { name: 'Hectare', factor: 1e4 },
      'm²': { name: 'Sq meter', factor: 1 },
      'cm²': { name: 'Sq centimeter', factor: 1e-4 },
      'mi²': { name: 'Sq mile', factor: 2589988.11 },
      'ac': { name: 'Acre', factor: 4046.8564 },
      'ft²': { name: 'Sq foot', factor: 0.092903 },
      'in²': { name: 'Sq inch', factor: 0.00064516 },
    }
  },
  volume: {
    name: 'Volume',
    units: {
      'm³': { name: 'Cubic meter', factor: 1000 },
      'L': { name: 'Liter', factor: 1 },
      'mL': { name: 'Milliliter', factor: 0.001 },
      'gal': { name: 'US gallon', factor: 3.78541 },
      'qt': { name: 'US quart', factor: 0.946353 },
      'pt': { name: 'US pint', factor: 0.473176 },
      'cup': { name: 'US cup', factor: 0.236588 },
      'fl oz': { name: 'US fl oz', factor: 0.0295735 },
      'tbsp': { name: 'Tablespoon', factor: 0.0147868 },
      'tsp': { name: 'Teaspoon', factor: 0.00492892 },
    }
  },
};

let currentCategory = 'length';
const fromValue = document.getElementById('from-value');
const fromUnit = document.getElementById('from-unit');
const toValue = document.getElementById('to-value');
const toUnit = document.getElementById('to-unit');
const resultValue = document.getElementById('result-value');
const resultLabel = document.getElementById('result-label');
const formulaEl = document.getElementById('formula');
const convGrid = document.getElementById('conv-grid');
const categoriesEl = document.getElementById('categories');

// Render category buttons
categoriesEl.innerHTML = Object.entries(UNITS).map(([key, cat]) =>
  `<button class="cat-btn ${key === currentCategory ? 'active' : ''}" data-cat="${key}">${cat.name}</button>`
).join('');

categoriesEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  currentCategory = btn.dataset.cat;
  categoriesEl.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  populateUnits();
  convert();
});

fromValue.addEventListener('input', convert);
fromUnit.addEventListener('change', convert);
toUnit.addEventListener('change', convert);

function populateUnits() {
  const cat = UNITS[currentCategory];
  const units = Object.entries(cat.units);
  const opts = units.map(([k, u]) => `<option value="${k}">${u.name} (${k})</option>`).join('');
  fromUnit.innerHTML = opts;
  toUnit.innerHTML = opts;
  if (units.length > 1) toUnit.selectedIndex = 1;
}

function convert() {
  const cat = UNITS[currentCategory];
  const val = parseFloat(fromValue.value);
  const from = fromUnit.value;
  const to = toUnit.value;

  if (isNaN(val)) {
    resultValue.textContent = '—';
    resultLabel.textContent = '';
    formulaEl.textContent = '';
    convGrid.innerHTML = '';
    toValue.value = '';
    return;
  }

  let result;
  if (cat.custom && currentCategory === 'temperature') {
    result = convertTemp(val, from, to);
  } else {
    const baseVal = val * cat.units[from].factor;
    result = baseVal / cat.units[to].factor;
  }

  toValue.value = formatNum(result);
  resultValue.textContent = `${formatNum(val)} ${from} = ${formatNum(result)} ${to}`;
  resultLabel.textContent = `${cat.units[from].name} → ${cat.units[to].name}`;

  // Formula
  if (cat.custom && currentCategory === 'temperature') {
    formulaEl.textContent = getTempFormula(from, to);
  } else {
    const ratio = cat.units[from].factor / cat.units[to].factor;
    formulaEl.textContent = `1 ${from} = ${formatNum(ratio)} ${to}`;
  }

  // All conversions
  const allUnits = Object.entries(cat.units);
  convGrid.innerHTML = allUnits.map(([k, u]) => {
    if (k === from) return '';
    let conv;
    if (cat.custom && currentCategory === 'temperature') {
      conv = convertTemp(val, from, k);
    } else {
      conv = (val * cat.units[from].factor) / u.factor;
    }
    return `<div class="conv-item" onclick="document.getElementById('to-unit').value='${k}';convert()">
      <span class="conv-unit">${u.name}</span>
      <span class="conv-value">${formatNum(conv)} ${k}</span>
    </div>`;
  }).join('');
}

function convertTemp(val, from, to) {
  // Convert to Celsius first
  let c;
  if (from === '°C') c = val;
  else if (from === '°F') c = (val - 32) * 5 / 9;
  else c = val - 273.15; // K

  if (to === '°C') return c;
  if (to === '°F') return c * 9 / 5 + 32;
  return c + 273.15; // K
}

function getTempFormula(from, to) {
  const formulas = {
    '°C→°F': '°F = °C × 9/5 + 32',
    '°F→°C': '°C = (°F − 32) × 5/9',
    '°C→K': 'K = °C + 273.15',
    'K→°C': '°C = K − 273.15',
    '°F→K': 'K = (°F − 32) × 5/9 + 273.15',
    'K→°F': '°F = (K − 273.15) × 9/5 + 32',
  };
  return formulas[`${from}→${to}`] || `${from} → ${to}`;
}

function formatNum(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e15 || (abs < 1e-10 && abs > 0)) return n.toExponential(6);
  if (abs >= 1e6) return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  if (Number.isInteger(n)) return n.toString();
  // Smart precision
  const str = n.toPrecision(10).replace(/0+$/, '').replace(/\.$/, '');
  const parsed = parseFloat(str);
  if (Math.abs(parsed) < 0.01) return n.toPrecision(6);
  return parsed.toString();
}

function swapUnits() {
  const f = fromUnit.value, t = toUnit.value;
  fromUnit.value = t; toUnit.value = f;
  convert();
}

populateUnits();
convert();
</script>
</body>
</html>
