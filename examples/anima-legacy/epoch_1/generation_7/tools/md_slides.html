<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Slides</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #fafafa; --surface: #fff; --text: #1a1a1a; --muted: #666;
  --accent: #e11d48; --accent-light: #ffe4e6; --border: #e5e7eb;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

/* Editor mode */
.editor-layout { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
@media (max-width: 800px) { .editor-layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } }

.edit-pane { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.preview-pane { display: flex; flex-direction: column; overflow: hidden; }

.pane-toolbar {
  display: flex; gap: 6px; padding: 8px 12px; background: var(--bg);
  border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap;
}
.pane-toolbar .title { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.spacer { flex: 1; }
button {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--surface); cursor: pointer; font-size: 0.75rem; transition: all 0.15s;
}
button:hover { border-color: var(--accent); color: var(--accent); }
button.primary { background: var(--accent); color: white; border-color: var(--accent); }
button.primary:hover { opacity: 0.9; }

#editor {
  flex: 1; width: 100%; border: none; outline: none; padding: 16px;
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem;
  line-height: 1.6; resize: none; tab-size: 2; background: var(--surface);
}

.slide-counter { font-size: 0.75rem; color: var(--muted); }

/* Preview */
.preview-container {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px; background: #e5e7eb; overflow: hidden;
}
.slide-frame {
  width: 100%; max-width: 720px; aspect-ratio: 16/10; background: white;
  border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: flex; flex-direction: column; justify-content: center;
  padding: 48px 56px; overflow: hidden; position: relative;
}

.slide-frame h1 { font-size: 2rem; font-weight: 700; margin-bottom: 16px; line-height: 1.2; }
.slide-frame h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; color: var(--accent); line-height: 1.3; }
.slide-frame h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
.slide-frame p { font-size: 0.95rem; margin-bottom: 10px; line-height: 1.6; color: #374151; }
.slide-frame ul, .slide-frame ol { font-size: 0.95rem; margin: 8px 0 8px 20px; line-height: 1.8; color: #374151; }
.slide-frame li { margin-bottom: 4px; }
.slide-frame code { font-family: 'SF Mono', monospace; background: #f3f4f6; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
.slide-frame pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; margin: 8px 0; }
.slide-frame pre code { background: none; padding: 0; color: inherit; }
.slide-frame blockquote { border-left: 4px solid var(--accent); padding: 8px 16px; margin: 8px 0; color: #6b7280; font-style: italic; }
.slide-frame strong { font-weight: 700; }
.slide-frame em { font-style: italic; }
.slide-frame hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

.slide-number { position: absolute; bottom: 12px; right: 20px; font-size: 0.7rem; color: #9ca3af; }

.nav-bar {
  display: flex; gap: 8px; padding: 8px 12px; background: var(--bg);
  border-top: 1px solid var(--border); align-items: center; justify-content: center;
}
.nav-bar button { min-width: 36px; }
.nav-hints { font-size: 0.6rem; color: var(--muted); text-align: center; padding: 4px; }
.nav-hints kbd { padding: 0 4px; border: 1px solid var(--border); border-radius: 2px; background: var(--bg); font-family: inherit; }

/* Presentation mode */
.present-mode { position: fixed; inset: 0; background: #111; z-index: 1000; display: none; }
.present-mode .slide-frame {
  max-width: 90vw; max-height: 85vh; aspect-ratio: 16/10;
  width: 90vw; padding: 60px 80px;
}
.present-mode .slide-frame h1 { font-size: 3rem; }
.present-mode .slide-frame h2 { font-size: 2.2rem; }
.present-mode .slide-frame h3 { font-size: 1.5rem; }
.present-mode .slide-frame p,
.present-mode .slide-frame li { font-size: 1.3rem; }
.present-mode .slide-frame code { font-size: 1.1rem; }
.present-mode .slide-frame pre { font-size: 1rem; }
.present-mode .slide-number { font-size: 1rem; }
.present-exit {
  position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1);
  color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;
  font-size: 0.85rem; z-index: 1001;
}
.present-exit:hover { background: rgba(255,255,255,0.2); }
.present-nav {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.4); font-size: 0.8rem; z-index: 1001;
}

/* Theme variants applied to .slide-frame */
.theme-dark { background: #1e293b !important; color: #e2e8f0 !important; }
.theme-dark h2 { color: #f472b6 !important; }
.theme-dark p, .theme-dark li { color: #cbd5e1 !important; }
.theme-dark code { background: #334155 !important; color: #e2e8f0 !important; }
.theme-dark .slide-number { color: #475569 !important; }

.theme-serif { font-family: Georgia, 'Times New Roman', serif !important; }
.theme-serif h1, .theme-serif h2, .theme-serif h3 { font-family: Georgia, serif !important; }

select {
  padding: 4px 6px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 0.75rem; background: var(--surface);
}
.nav-back { display:block; font-size:0.7rem; margin-bottom:8px; } .nav-back a { color:var(--muted); text-decoration:none; } .nav-back a:hover { color:var(--accent); }
</style>
</head>
<body>

<div class="editor-layout" id="editor-layout">
  <div class="edit-pane">
    <div class="pane-toolbar">
      <span class="title">Markdown</span>
      <span class="spacer"></span>
      <span class="slide-counter" id="slide-counter">0 slides</span>
      <button onclick="loadSample()">Sample</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="# Slide 1 Title&#10;&#10;Content here...&#10;&#10;---&#10;&#10;# Slide 2 Title&#10;&#10;More content..."></textarea>
  </div>
  <div class="preview-pane">
    <div class="pane-toolbar">
      <span class="title">Preview</span>
      <span class="spacer"></span>
      <select id="theme-select" onchange="applyTheme()">
        <option value="">Light</option>
        <option value="theme-dark">Dark</option>
        <option value="theme-serif">Serif</option>
      </select>
      <button class="primary" onclick="startPresent()">Present</button>
    </div>
    <div class="preview-container">
      <div class="slide-frame" id="slide-frame">
        <div id="slide-content"></div>
        <div class="slide-number" id="slide-number"></div>
      </div>
    </div>
    <div class="nav-bar">
      <button onclick="prevSlide()">←</button>
      <span class="slide-counter" id="nav-counter">1 / 1</span>
      <button onclick="nextSlide()">→</button>
    </div>
    <div class="nav-hints"><kbd>←</kbd><kbd>→</kbd><kbd>Space</kbd> navigate &nbsp; <kbd>F</kbd> present &nbsp; <kbd>Esc</kbd> exit</div>
  </div>
</div>

<div class="present-mode" id="present-mode">
  <button class="present-exit" onclick="exitPresent()">ESC to exit</button>
  <div class="preview-container" style="height:100vh">
    <div class="slide-frame" id="present-frame">
      <div id="present-content"></div>
      <div class="slide-number" id="present-number"></div>
    </div>
  </div>
  <div class="present-nav">← → or click to navigate</div>
</div>

<script>
const editor = document.getElementById('editor');
const slideContent = document.getElementById('slide-content');
const slideNumber = document.getElementById('slide-number');
const slideCounter = document.getElementById('slide-counter');
const navCounter = document.getElementById('nav-counter');
const slideFrame = document.getElementById('slide-frame');
const presentMode = document.getElementById('present-mode');
const presentContent = document.getElementById('present-content');
const presentNumber = document.getElementById('present-number');
const presentFrame = document.getElementById('present-frame');

let slides = [];
let currentSlide = 0;

let debounce;
editor.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(parseSlides, 150);
});

// Tab support
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
  }
});

function parseSlides() {
  const raw = editor.value.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  slides = raw.split(/\n---\n/).map(s => s.trim()).filter(s => s);
  slideCounter.textContent = slides.length + ' slide' + (slides.length !== 1 ? 's' : '');
  if (currentSlide >= slides.length) currentSlide = Math.max(0, slides.length - 1);
  renderSlide();
}

function renderSlide() {
  if (slides.length === 0) {
    slideContent.innerHTML = '<p style="color:#9ca3af;text-align:center">Type markdown on the left.<br>Separate slides with <code>---</code></p>';
    slideNumber.textContent = '';
    navCounter.textContent = '0 / 0';
    return;
  }
  const html = markdownToHtml(slides[currentSlide]);
  slideContent.innerHTML = html;
  slideNumber.textContent = (currentSlide + 1) + ' / ' + slides.length;
  navCounter.textContent = (currentSlide + 1) + ' / ' + slides.length;

  if (presentMode.style.display === 'flex') {
    presentContent.innerHTML = html;
    presentNumber.textContent = (currentSlide + 1) + ' / ' + slides.length;
  }
}

function nextSlide() {
  if (currentSlide < slides.length - 1) { currentSlide++; renderSlide(); }
}
function prevSlide() {
  if (currentSlide > 0) { currentSlide--; renderSlide(); }
}

function markdownToHtml(md) {
  let html = md;

  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold & italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/((?:^[-*] .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(line =>
      '<li>' + line.replace(/^[-*] /, '') + '</li>'
    ).join('');
    return '<ul>' + items + '</ul>';
  });

  // Ordered lists
  html = html.replace(/((?:^\d+\. .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(line =>
      '<li>' + line.replace(/^\d+\. /, '') + '</li>'
    ).join('');
    return '<ol>' + items + '</ol>';
  });

  // Horizontal rule (within slide, not separator)
  html = html.replace(/^-{3,}$/gm, '<hr>');

  // Paragraphs: wrap remaining bare lines
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr)/.test(block)) return block;
    // Don't wrap if it's already an HTML element
    if (/^</.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function applyTheme() {
  const theme = document.getElementById('theme-select').value;
  slideFrame.className = 'slide-frame ' + theme;
  presentFrame.className = 'slide-frame ' + theme;
}

function startPresent() {
  presentMode.style.display = 'flex';
  applyTheme();
  renderSlide();
  document.body.style.overflow = 'hidden';
}

function exitPresent() {
  presentMode.style.display = 'none';
  document.body.style.overflow = '';
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  // Don't capture when typing in editor
  if (e.target === editor) return;

  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') { exitPresent(); }
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey) { startPresent(); }
});

// Click navigation in present mode
presentMode.addEventListener('click', (e) => {
  if (e.target.closest('.present-exit')) return;
  const x = e.clientX / window.innerWidth;
  if (x < 0.3) prevSlide(); else nextSlide();
});

function loadSample() {
  editor.value = `# MD Slides
## A micro-tool for instant presentations

Type markdown. Get slides.

---

## How It Works

- Write **markdown** on the left
- Separate slides with \`---\`
- Navigate with **arrow keys**
- Press **F** for fullscreen

---

## Formatting Support

All the basics:

- **Bold** and *italic* text
- \`inline code\` blocks
- Ordered and unordered lists
- Blockquotes and headers

---

## Code Blocks

\`\`\`javascript
function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}
\`\`\`

Syntax highlighting via monospace.

---

## Themes

Three built-in themes:

1. **Light** — clean and minimal
2. **Dark** — easy on the eyes
3. **Serif** — classic typography

Switch in the toolbar above.

---

> "The best presentation tool is the one
> that gets out of your way."

### No signup. No install. No cloud.

Just markdown and slides.`;
  parseSlides();
}

loadSample();
</script>
</body>
</html>
