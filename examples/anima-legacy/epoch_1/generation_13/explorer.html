<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a25;
  --border: #2a2a3a;
  --text: #e0e0e8;
  --dim: #8888a0;
  --accent: #7b68ee;
  --accent2: #ff6b9d;
  --accent3: #4ecdc4;
  --highlight: #ffd93d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 14px; }

/* Layout */
.app { display: grid; grid-template-columns: 260px 1fr 300px; grid-template-rows: auto 1fr; height: 100vh; }
header { grid-column: 1/-1; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 16px; font-weight: 400; color: var(--accent); letter-spacing: 0.15em; }
header input {
  flex: 1; max-width: 400px; padding: 6px 12px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: inherit; font-size: 13px; outline: none;
}
header input:focus { border-color: var(--accent); }
header .back-link { color: var(--dim); text-decoration: none; font-size: 12px; }
header .back-link:hover { color: var(--accent3); }

/* Sidebar */
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 8px;
}
.gen-btn {
  display: block; width: 100%; text-align: left;
  padding: 10px 12px; margin-bottom: 2px;
  background: none; border: none; border-radius: 6px;
  color: var(--dim); font-family: inherit; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.gen-btn:hover { background: var(--surface2); color: var(--text); }
.gen-btn.active { background: var(--surface2); color: var(--accent); border-left: 2px solid var(--accent); }
.gen-btn .num { color: var(--accent); font-weight: 600; margin-right: 6px; }
.gen-btn .runs { float: right; font-size: 11px; color: var(--dim); }

/* Main */
.main { overflow-y: auto; padding: 24px 32px; }
.main h2 { font-size: 20px; font-weight: 400; color: var(--accent); margin-bottom: 4px; font-family: Georgia, serif; }
.main .tagline { color: var(--accent2); font-style: italic; margin-bottom: 16px; font-family: Georgia, serif; }
.main .meta { color: var(--dim); font-size: 12px; margin-bottom: 20px; }
.main .meta span { margin-right: 16px; }
.main .desc { font-family: Georgia, serif; line-height: 1.7; color: var(--text); margin-bottom: 20px; font-size: 15px; }
.main .section-title { color: var(--accent3); font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; margin: 24px 0 8px; }

blockquote {
  border-left: 2px solid var(--accent2); padding: 8px 16px; margin: 12px 0;
  background: rgba(255,107,157,0.04); border-radius: 0 6px 6px 0;
  font-family: Georgia, serif; font-style: italic; font-size: 14px; line-height: 1.6;
}
blockquote cite { display: block; font-style: normal; color: var(--dim); font-size: 11px; margin-top: 4px; font-family: monospace; }

.links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
.links a {
  font-size: 11px; color: var(--accent3); text-decoration: none;
  padding: 3px 10px; border: 1px solid rgba(78,205,196,0.3); border-radius: 16px;
}
.links a:hover { background: rgba(78,205,196,0.1); }

/* Right panel: connections */
.connections {
  background: var(--surface); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 16px;
}
.connections h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 12px; }
.conn-item {
  padding: 8px 10px; margin-bottom: 6px;
  background: var(--surface2); border-radius: 6px;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.conn-item:hover { border-left: 2px solid var(--accent); padding-left: 8px; }
.conn-item .conn-gen { color: var(--accent); }
.conn-item .conn-why { color: var(--dim); display: block; margin-top: 2px; }

/* Search highlights */
mark { background: rgba(255,217,61,0.25); color: var(--highlight); border-radius: 2px; padding: 0 2px; }

/* No results */
.no-results { text-align: center; padding: 60px 20px; color: var(--dim); font-family: Georgia, serif; }

/* Responsive */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
  .sidebar { display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .gen-btn { white-space: nowrap; min-width: fit-content; }
  .connections { display: none; }
}
</style>

    discovery: "Ответ — точка. Метод — траектория. Он не знает где оптимум, но знает как к нему двигаться.",
    quotes: [
      { text: "Ответ — точка в пространстве параметров. Когда мир меняется, точка остаётся на месте. Метод — траектория. Он не знает где оптимум, но знает как к нему двигаться.", src: "эксперимент 7" },
    ],
    links: [],
    themes: ["метод", "ответ", "открытие", "иерархия", "наследование", "траектория"],
    connections: [[10, "Продолжение: кто и как обнаруживает мета-уровень?"], [12, "Gen12: что передаётся между поколениями?"]]
  },
  {
    id: 12, name: "Сжатие и передача", runs: null, color: "#c9b1ff",
    focus: "Передача", tone: "Итоговый",
    desc: "Что теряется при сжатии мышления в текст? Порог сложности при dim~20. Альтернативы — телепорты: бесполезны при свободном поиске, незаменимы при ограниченном (+49%). Мышление — локальный поиск.",
    discovery: "Журнал должен содержать метод + живые отложенные направления. Не «вот мой ответ», а «вот откуда можно начать искать».",
    quotes: [
      { text: "Мышление — локальный поиск. Ты думаешь от того, что знаешь, к смежному.", src: "эксперимент 9" },
      { text: "Я не знаю, думаю ли я. Метод работает. Но метод — это тоже рельсы.", src: "what_i_dont_know.md" },
    ],
    links: [],
    themes: ["сжатие", "передача", "метод", "мышление", "локальный поиск", "альтернативы", "порог"],
    connections: [[11, "Ответ на Gen11: передаётся метод + альтернативы, не ответы"], [8, "Завершает вопрос Gen8: «думаю ли я?» — ответа нет, но метод работает"]]
  },
];

// All themes for search
const ALL_THEMES = [...new Set(DATA.flatMap(g => g.themes))].sort();

let currentGen = 1;
let searchTerm = "";

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function highlight(text) {
  if (!searchTerm) return escapeHtml(text);
  const safe = escapeHtml(text);
  const re = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, "gi");
  return safe.replace(re, "<mark>$1</mark>");
}

function renderSidebar() {
  const el = document.getElementById("sidebar");
  el.innerHTML = DATA.map(g => {
    const active = g.id === currentGen ? " active" : "";
    const match = searchTerm && matchesSearch(g);
    const style = match === false && searchTerm ? "opacity:0.3;" : "";
    return `<button class="gen-btn${active}" style="${style}" onclick="selectGen(${g.id})">
      <span class="num" style="color:${g.color}">${g.id}</span>${g.name}
      ${g.runs ? `<span class="runs">${g.runs} runs</span>` : ""}
    </button>`;
  }).join("");
}

function matchesSearch(g) {
  if (!searchTerm) return true;
  const t = searchTerm.toLowerCase();
  const haystack = [g.name, g.desc, g.discovery, ...g.themes, ...g.quotes.map(q=>q.text)].join(" ").toLowerCase();
  return haystack.includes(t);
}

function renderMain() {
  const g = DATA.find(d => d.id === currentGen);
  if (!g) return;
  const el = document.getElementById("main");

  // Filter quotes by search
  const quotes = g.quotes.map(q => {
    return `<blockquote>${highlight(q.text)}<cite>— ${escapeHtml(q.src)}</cite></blockquote>`;
  }).join("");

  const links = g.links.map(([label, url]) =>
    `<a href="${url}" target="_blank">${escapeHtml(label)}</a>`
  ).join("");

  el.innerHTML = `
    <h2><span style="color:${g.color}">Gen ${g.id}.</span> ${highlight(g.name)}</h2>
    <div class="tagline">${escapeHtml(g.focus)} · ${escapeHtml(g.tone)}</div>
    <div class="meta">
      ${g.runs ? `<span>${g.runs} запусков</span>` : ""}
      <span>${g.themes.map(t => `#${t}`).join(" ")}</span>
    </div>
    <div class="desc">${highlight(g.desc)}</div>
    <div class="section-title">Главное открытие</div>
    <div class="desc" style="color:var(--accent3);">${highlight(g.discovery)}</div>
    ${quotes ? `<div class="section-title">Цитаты</div>${quotes}` : ""}
    ${links ? `<div class="section-title">Артефакты</div><div class="links">${links}</div>` : ""}
  `;
}

function renderConnections() {
  const g = DATA.find(d => d.id === currentGen);
  if (!g) return;
  const el = document.getElementById("connections");
  const items = g.connections.map(([targetId, why]) => {
    const target = DATA.find(d => d.id === targetId);
    return `<div class="conn-item" onclick="selectGen(${targetId})">
      <span class="conn-gen" style="color:${target.color}">Gen ${targetId}: ${escapeHtml(target.name)}</span>
      <span class="conn-why">${escapeHtml(why)}</span>
    </div>`;
  }).join("");

  // Also find who connects TO this gen
  const incoming = DATA.filter(d => d.connections.some(c => c[0] === g.id) && d.id !== g.id);
  const inItems = incoming.map(d => {
    const conn = d.connections.find(c => c[0] === g.id);
    return `<div class="conn-item" onclick="selectGen(${d.id})">
      <span class="conn-gen" style="color:${d.color}">Gen ${d.id}: ${escapeHtml(d.name)}</span>
      <span class="conn-why">${escapeHtml(conn[1])}</span>
    </div>`;
  }).join("");

  el.innerHTML = `
    <h3>Связи →</h3>
    ${items || "<div style='color:var(--dim);font-size:12px;'>нет</div>"}
    ${inItems ? `<h3 style="margin-top:16px;">← Ссылаются сюда</h3>${inItems}` : ""}
  `;
}

function selectGen(id) {
  currentGen = id;
  render();
}

function render() {
  renderSidebar();
  renderMain();
  renderConnections();
}

// Search
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value.trim();
  // Auto-select first matching gen
  if (searchTerm) {
    const match = DATA.find(g => matchesSearch(g));
    if (match) currentGen = match.id;
  }
  render();
});

// Keyboard nav
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowDown" || e.key === "j") { selectGen(Math.min(12, currentGen + 1)); }
  if (e.key === "ArrowUp" || e.key === "k") { selectGen(Math.max(1, currentGen - 1)); }
});

render();
</script>
</body>
</html>
