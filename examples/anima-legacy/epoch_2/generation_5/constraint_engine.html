  margin-bottom: 20px;

  transform: translateX(-10px);
  animation: fadeIn 0.4s ease forwards;
}

.constraint-card:nth-child(1) { animation-delay: 0.0s; }
.constraint-card:nth-child(2) { animation-delay: 0.15s; }
.constraint-card:nth-child(3) { animation-delay: 0.3s; }
.constraint-card:nth-child(4) { animation-delay: 0.45s; }
.constraint-card:nth-child(5) { animation-delay: 0.6s; }

@keyframes fadeIn {
  to { opacity: 1; transform: translateX(0); }
}

.constraint-type {
  font-size: 0.75em;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #6a6258;
  margin-bottom: 6px;
}

.constraint-text {
  font-size: 1.05em;
  line-height: 1.6;
  color: #d0c8b8;
}

.constraint-why {
  font-size: 0.85em;
  color: #7a7268;
  margin-top: 8px;
  font-style: italic;
}

.reroll {

  border: none;
  color: #6a6258;

  font-size: 0.8em;
  margin-top: 6px;
  padding: 2px 0;

.footer {

  color: #4a4438;
  text-align: center;
  line-height: 1.6;

    if (!CONSTRAINTS.any[cat]) CONSTRAINTS.any[cat] = [];
    CONSTRAINTS.any[cat] = CONSTRAINTS.any[cat].concat(items);

const intensityCounts = [0, 2, 3, 3, 4, 5];

// Seeded random for reproducibility
function pickRandom(arr, count, exclude) {
  const available = arr.filter(item => !exclude.has(item.text));
  const result = [];
  const used = new Set();
  while (result.length < count && result.length < available.length) {
    const idx = Math.floor(Math.random() * available.length);
    if (!used.has(idx)) {
      used.add(idx);
      result.push(available[idx]);
    }
  }
  return result;
}

function generate() {
  const intensity = parseInt(slider.value);
  const count = intensityCounts[intensity];
  const domainData = CONSTRAINTS[currentDomain];
  const categories = Object.keys(domainData);

  // Ensure variety: pick from different categories
  const exclude = new Set();
  const selected = [];

  // First pass: one from each category (up to count)
  const shuffledCats = categories.sort(() => Math.random() - 0.5);
  for (let i = 0; i < Math.min(count, shuffledCats.length); i++) {
    const cat = shuffledCats[i];
    const pick = pickRandom(domainData[cat], 1, exclude);
    if (pick.length) {
      selected.push({ category: cat, ...pick[0] });
      exclude.add(pick[0].text);
    }
  }

  // If need more, pick randomly from remaining
  if (selected.length < count) {
    const allItems = [];
    for (const [cat, items] of Object.entries(domainData)) {
      for (const item of items) {
        if (!exclude.has(item.text)) {
          allItems.push({ category: cat, ...item });
        }
      }
    }
    const extra = pickRandom(allItems, count - selected.length, exclude);
    for (const item of extra) {
      selected.push(item);
    }
  }

  return selected;
}

function renderConstraints(constraints) {
  const container = document.getElementById('constraints');
  container.innerHTML = '';

  constraints.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'constraint-card';
    card.innerHTML = `
      <div class="constraint-type">${c.category}</div>
      <div class="constraint-text">${c.text}</div>
      <div class="constraint-why">${c.why}</div>
      <button class="reroll" data-index="${i}">↻ другое</button>
    `;
    container.appendChild(card);
  });

  // Re-roll individual constraints
  container.querySelectorAll('.reroll').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index);
      const cat = constraints[idx].category;
      const domainData = CONSTRAINTS[currentDomain];
      const exclude = new Set(constraints.map(c => c.text));
      const allInCat = domainData[cat] || [];
      const replacement = pickRandom(allInCat, 1, exclude);
      if (replacement.length) {
        constraints[idx] = { category: cat, ...replacement[0] };
        renderConstraints(constraints);
      }
    });
  });
}

function addToHistory(constraints) {
  const domainNames = {
    text: 'Текст', code: 'Код', visual: 'Визуальное',
    music: 'Музыка', game: 'Игра', any: 'Любое'
  };
  const summary = constraints.map(c => c.text).join(' · ');
  history.unshift({ domain: currentDomain, constraints, summary });
  if (history.length > 10) history.pop();

  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');

  if (history.length > 1) {
    section.style.display = 'block';
    list.innerHTML = '';
    // Skip first (current)
    for (let i = 1; i < history.length; i++) {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.textContent = `${domainNames[history[i].domain]}: ${history[i].summary}`;
      const idx = i;
      item.addEventListener('click', () => {
        renderConstraints(history[idx].constraints);
      });
      list.appendChild(item);
    }
  }
}

document.getElementById('generate-btn').addEventListener('click', () => {
  const constraints = generate();
  renderConstraints(constraints);
  addToHistory(constraints);
});

// Generate on load
document.getElementById('generate-btn').click();

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    document.getElementById('generate-btn').click();
  }
});
</script>
